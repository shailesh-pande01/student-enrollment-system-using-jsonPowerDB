<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Enrollment Form – SCHOOL-DB</title>

    <!-- Bootstrap 5 CSS for styling -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* ── Page background ── */
        body {
            background: #dce8f5;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* ── Card shell ── */
        .card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 6px 24px rgba(0, 60, 120, 0.15);
            overflow: hidden;
        }

        /* ── Blue header gradient ── */
        .card-header {
            background: linear-gradient(135deg, #0d47a1, #1976d2);
            padding: 1.4rem 2rem;
        }
        .card-header small {
            opacity: 0.75;
            font-size: 0.78rem;
            letter-spacing: 0.04em;
        }

        /* ── Disabled fields look distinct ── */
        .form-control:disabled,
        textarea:disabled {
            background-color: #f0f4f8;
            cursor: not-allowed;
        }

        /* ── Section label style ── */
        .form-label {
            font-size: 0.88rem;
            color: #374151;
            margin-bottom: 4px;
        }

        /* ── Buttons ── */
        .btn {
            min-width: 110px;
            font-weight: 500;
        }

        /* ── Status alert is hidden until needed ── */
        #statusMsg {
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card">

                <!-- ── Header ── -->
                <div class="card-header text-white text-center">
                    <h4 class="mb-1">🎓 Student Enrollment Form</h4>
                    <small>Database: SCHOOL-DB &nbsp;|&nbsp; Table: STUDENT-TABLE</small>
                </div>

                <!-- ── Form Body ── -->
                <div class="card-body p-4">

                    <!-- Status / feedback message (hidden on load) -->
                    <div id="statusMsg" class="alert d-none mb-4" role="alert"></div>

                    <!-- ── Row 1: Roll No + Search Button + Full Name ── -->
                    <div class="row">
                        <div class="col-md-5 mb-3">
                            <label for="rollNo" class="form-label fw-semibold">
                                Roll No <span class="text-danger">*</span>
                                <span class="text-muted fw-normal">(Primary Key)</span>
                            </label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="rollNo"
                                       placeholder="Enter Roll No" autocomplete="off">
                                <button class="btn btn-primary" type="button" id="searchBtn">
                                    🔍 Search
                                </button>
                            </div>
                            <div class="form-text">Enter Roll No, then press Enter or click Search</div>
                        </div>
                        <div class="col-md-7 mb-3">
                            <label for="fullName" class="form-label fw-semibold">
                                Full Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="fullName"
                                   placeholder="Enter student's full name" disabled>
                        </div>
                    </div>

                    <!-- ── Row 2: Class + Birth Date + Enrolment Date ── -->
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label for="stdClass" class="form-label fw-semibold">
                                Class <span class="text-danger">*</span>
                            </label>
                            <input type="text" class="form-control" id="stdClass"
                                   placeholder="e.g. 10-A" disabled>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="birthDate" class="form-label fw-semibold">
                                Birth Date <span class="text-danger">*</span>
                            </label>
                            <input type="date" class="form-control" id="birthDate" disabled>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label for="enrollmentDate" class="form-label fw-semibold">
                                Enrollment Date <span class="text-danger">*</span>
                            </label>
                            <input type="date" class="form-control" id="enrollmentDate" disabled>
                        </div>
                    </div>

                    <!-- ── Row 3: Address ── -->
                    <div class="mb-4">
                        <label for="address" class="form-label fw-semibold">
                            Address <span class="text-danger">*</span>
                        </label>
                        <textarea class="form-control" id="address" rows="2"
                                  placeholder="Enter student's full address" disabled></textarea>
                    </div>

                    <!-- ── Action Buttons ── -->
                    <hr class="my-3">
                    <div class="d-flex gap-2 flex-wrap">
                        <button type="button" id="saveBtn"
                                class="btn btn-success" disabled onclick="saveStudent()">
                            💾 Save
                        </button>
                        <button type="button" id="updateBtn"
                                class="btn btn-warning" disabled onclick="updateStudent()">
                            ✏️ Update
                        </button>
                        <button type="button" id="resetBtn"
                                class="btn btn-secondary" disabled onclick="resetForm()">
                            🔄 Reset
                        </button>
                    </div>

                </div><!-- /card-body -->
            </div><!-- /card -->
        </div>
    </div>
</div>

<!-- 1. jQuery -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<!-- 2. Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- NOTE: jpdb-commons.js removed — request builders and executeCommand
     are now defined inline in index.js (same pattern as the working example) -->

<!-- 3. Our application logic -->
<script src="index.js"></script>

</body>
</html>
